name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper (Cloud)
      run: gradle wrapper --gradle-version 8.4

    - name: Setup Gradle caching
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK with Wrapper
      run: ./gradlew assembleDebug --warning-mode all

    - name: Upload APK directly to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GorakhScanner-App
        path: app/build/outputs/apk/debug/app-debug.apk
